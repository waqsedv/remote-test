name: Build Windows .exe

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Agent + Controller (.exe)
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Agent dependencies
        working-directory: agent
        run: npm install

      - name: Build Agent .exe
        working-directory: agent
        run: npx electron-builder --win --x64 --publish never

      - name: Install Controller dependencies
        working-directory: controller
        run: npm install

      - name: Build Controller .exe
        working-directory: controller
        run: npx electron-builder --win --x64 --publish never

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FastFood Remote ${{ github.ref_name }}"
          body: |
            ## FastFood Remote ${{ github.ref_name }}

            ### Agent (borne Windows)
            - Téléchargez et lancez `FastFood-Agent*.exe`
            - L'agent tourne **en arrière-plan** (icône dans la barre système)
            - Aucun code à communiquer — connexion automatique au serveur

            ### Controller (opérateur)
            - Téléchargez et lancez `FastFood-Remote*.exe`
            - Tous les agents en ligne apparaissent dans la liste
            - Cliquez sur **Se connecter** pour prendre le contrôle
            - Multi-sessions : gérez plusieurs bornes simultanément
          files: |
            agent/dist/*.exe
            controller/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
