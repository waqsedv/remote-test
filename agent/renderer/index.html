<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' http: ws:; media-src *;">
  <title>FastFood Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      overflow: hidden;
    }

    /* Barre de titre custom */
    .titlebar {
      -webkit-app-region: drag;
      height: 36px;
      background: #1a1d2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }
    .titlebar-left { display: flex; align-items: center; gap: 8px; }
    .titlebar-icon { width: 18px; height: 18px; opacity: 0.9; }
    .titlebar-title { font-size: 13px; font-weight: 600; color: #a0aec0; }
    .titlebar-controls { -webkit-app-region: no-drag; display: flex; gap: 6px; }
    .titlebar-btn {
      width: 28px; height: 28px; border-radius: 6px; border: none;
      background: transparent; color: #718096; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: background 0.15s, color 0.15s;
    }
    .titlebar-btn:hover { background: #2d3148; color: #e2e8f0; }
    .titlebar-btn.close:hover { background: #fc4a4a; color: white; }

    /* Contenu principal */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 28px;
    }

    /* Logo + nom */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .brand-logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .brand-name { font-size: 20px; font-weight: 700; color: #e2e8f0; letter-spacing: 0.3px; }
    .brand-sub { font-size: 12px; color: #718096; }

    /* Badge ID de session */
    .session-card {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 24px 32px;
      text-align: center;
      width: 100%;
    }
    .session-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #718096;
      margin-bottom: 12px;
    }
    .session-id {
      font-size: 44px;
      font-weight: 800;
      letter-spacing: 12px;
      color: #a78bfa;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
    }
    .session-id.loading { color: #4a5568; animation: pulse 1.4s ease-in-out infinite; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .session-hint {
      font-size: 12px;
      color: #4a5568;
      margin-top: 10px;
    }

    /* Statut */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 10px;
      width: 100%;
    }
    .status-dot {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
      background: #4a5568;
      transition: background 0.3s;
    }
    .status-dot.connecting { background: #f6c90e; animation: pulse 1s infinite; }
    .status-dot.connected  { background: #48bb78; box-shadow: 0 0 8px #48bb7880; }
    .status-dot.error      { background: #fc4a4a; }

    .status-text { font-size: 13px; color: #a0aec0; flex: 1; }
    .controller-id { font-size: 11px; color: #718096; font-family: monospace; }

    /* Log des événements */
    .log {
      width: 100%;
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 11px;
      font-family: 'SF Mono', monospace;
      color: #718096;
      max-height: 80px;
      overflow-y: auto;
      line-height: 1.6;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 2px; }
  </style>
</head>
<body>
  <!-- Barre de titre custom -->
  <div class="titlebar">
    <div class="titlebar-left">
      <svg class="titlebar-icon" viewBox="0 0 24 24" fill="none">
        <rect width="24" height="24" rx="6" fill="#6c63ff"/>
        <path d="M7 12h10M7 8h10M7 16h6" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="titlebar-title">FastFood Agent</span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" onclick="minimize()">─</button>
      <button class="titlebar-btn close" onclick="quit()">✕</button>
    </div>
  </div>

  <!-- Contenu -->
  <div class="main">
    <div class="brand">
      <div class="brand-logo">🖥️</div>
      <div class="brand-name">Accès à distance</div>
      <div class="brand-sub">Agent borne FastFood</div>
    </div>

    <div class="session-card">
      <div class="session-label">Votre code d'accès</div>
      <div class="session-id loading" id="sessionId">------</div>
      <div class="session-hint">Communiquez ce code à l'opérateur</div>
    </div>

    <div class="status-row">
      <div class="status-dot connecting" id="statusDot"></div>
      <span class="status-text" id="statusText">Connexion au serveur...</span>
      <span class="controller-id" id="controllerId"></span>
    </div>

    <div class="log" id="log">Démarrage...</div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
